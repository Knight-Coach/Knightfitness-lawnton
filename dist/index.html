  <!-- Authoritative stylesheet, synced from the Lovable build -->

  <style>
    /* On-brand accent for the hero primary CTA (design tokens leave --accent a light grey) */
    :root { --accent: #E31E24; }
    body { padding: 0; margin: 0; }

    /* Accreditations band folded into the top of the footer */
    .footer-trust {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1.75rem 2.5rem;
      padding-bottom: 2.5rem;
      margin-bottom: 2.75rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }
    .footer-trust .trust-reviews { flex: 0 0 auto; flex-direction: column; gap: 0.4rem; min-width: 0; }
    .footer-trust .trust-reviews-rating strong { font-size: 1.4rem; }
    .footer-trust .trust-creds {
      flex: 1 1 480px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 1.25rem 2.25rem;
      margin: 0;
      padding: 0 0 0 2.5rem;
      list-style: none;
      border-left: 1px solid rgba(255, 255, 255, 0.12);
    }
    .footer-trust .trust-cred { flex: 0 1 auto; }
    @media (max-width: 960px) {
      .footer-trust { justify-content: center; text-align: center; gap: 1.5rem 2rem; }
      .footer-trust .trust-reviews { align-items: center; }
      .footer-trust .trust-creds {
        flex-basis: 100%;
        justify-content: center;
        border-left: none;
        padding-left: 0;
        gap: 1rem 1.75rem;
      }
    }
    @media (max-width: 560px) {
      .footer-trust .trust-creds { flex-direction: column; align-items: flex-start; gap: 0.9rem; text-align: left; }
    }

    /* Desktop Programs dropdown */
    .nav-dropdown { position: relative; display: inline-flex; align-items: center; }
    .nav-dropdown-trigger { display: inline-flex !important; align-items: center; gap: 0.32rem; }
    .nav-chevron { transition: transform 0.2s ease; margin-top: 1px; }
    .nav-dropdown:hover .nav-chevron,
    .nav-dropdown:focus-within .nav-chevron { transform: rotate(180deg); }
    /* invisible hover bridge so the menu doesn't close in the gap */
    .nav-dropdown::after { content: ""; position: absolute; top: 100%; left: -0.75rem; right: -0.75rem; height: 18px; }
    .nav-dropdown-menu {
      position: absolute;
      top: calc(100% + 16px);
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      min-width: 212px;
      background: #fff;
      border-radius: 0.7rem;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.18);
      padding: 0.45rem;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s;
      z-index: 120;
    }
    .nav-dropdown:hover .nav-dropdown-menu,
    .nav-dropdown:focus-within .nav-dropdown-menu {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .nav-dropdown-menu::before {
      content: "";
      position: absolute;
      top: -5px;
      left: 50%;
      transform: translateX(-50%) rotate(45deg);
      width: 12px;
      height: 12px;
      background: #fff;
      border-radius: 2px;
    }
    .nav-dropdown-menu a {
      color: var(--kf-black) !important;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 0.62rem 0.85rem;
      border-radius: 0.45rem;
      white-space: nowrap;
      position: relative;
      z-index: 1;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .nav-dropdown-menu a:hover { background: var(--kf-gray); color: var(--kf-red) !important; }
    .nav-dropdown-all {
      margin-top: 0.25rem;
      padding-top: 0.7rem !important;
      border-top: 1px solid #eee;
      border-radius: 0 !important;
      font-size: 0.78rem !important;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--kf-red) !important;
    }
    .nav-dropdown-all:hover { background: transparent !important; }

    /* Mobile drawer program sub-links */
    .mobile-subnav { display: flex; flex-direction: column; margin: 0.1rem 0 0.35rem 0.4rem; }
    .mobile-subnav a {
      font-size: 1rem !important;
      font-weight: 600 !important;
      color: rgba(255, 255, 255, 0.62) !important;
      padding: 0.6rem 0 0.6rem 1rem !important;
      border-bottom: none !important;
      border-left: 2px solid rgba(255, 255, 255, 0.18);
    }
    .mobile-subnav a:hover { color: var(--kf-red) !important; border-left-color: var(--kf-red); padding-left: 1.15rem !important; }

    /* Consolidated class schedule (Mon–Fri + Weekend) */
    .sched2 {
      display: grid;
      grid-template-columns: 1.55fr 1fr;
      gap: 1.25rem;
      max-width: 1080px;
      margin: 0 auto;
      align-items: start;
    }
    @media (max-width: 880px) { .sched2 { grid-template-columns: 1fr; } }
    .sched2-card {
      background: #fff;
      border-radius: 1rem;
      padding: 1.85rem 1.85rem 2rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
      border-top: 4px solid var(--kf-red);
    }
    .sched2-head { padding-bottom: 1.1rem; border-bottom: 1px solid #eee; }
    .sched2-day {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.04em;
      color: var(--kf-black);
      line-height: 1;
    }
    .sched2-sub {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--kf-gray-dark);
      margin-top: 0.5rem;
    }
    .sched2-group { margin-top: 1.4rem; }
    .sched2-group-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--kf-red);
      margin-bottom: 0.75rem;
    }
    .sched2-chips { display: flex; flex-wrap: wrap; gap: 0.6rem; align-items: stretch; }
    .sched2-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--kf-gray);
      border: 1px solid transparent;
      border-radius: 0.6rem;
      padding: 0.6rem 0.85rem;
      min-width: 76px;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .sched2-chip:hover { background: var(--kf-red); transform: translateY(-2px); }
    .sched2-chip-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.03em;
      line-height: 1;
      color: var(--kf-black);
    }
    .sched2-chip:hover .sched2-chip-time { color: #fff; }
    .sched2-chip-tag {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--kf-red);
      margin-top: 0.3rem;
      white-space: nowrap;
    }
    .sched2-chip:hover .sched2-chip-tag { color: rgba(255, 255, 255, 0.9); }
    @media (max-width: 480px) {
      .sched2-card { padding: 1.5rem 1.35rem 1.65rem; }
      .sched2-chips { gap: 0.5rem; }
      .sched2-chip { min-width: 0; flex: 1 1 calc(33.333% - 0.5rem); padding: 0.55rem 0.5rem; }
    }
  </style>
